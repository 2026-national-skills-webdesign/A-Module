<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .scene {width: 280px;height: 360px;transform-style: preserve-3d;}
    .card {border-radius: 20px; position: absolute;display: flex;justify-content: center;width: 100%;height: 100%;align-items: center; color: #fff;font-weight: bold;box-shadow: 0 0 8px #00000033; }
.card:nth-child(1) { background: linear-gradient(135deg, #f97060, #e91e8c) }
    .card:nth-child(2) { background: linear-gradient(135deg, #6c63ff, #3b82f6) }
    .card:nth-child(3) { background: linear-gradient(135deg, #4a0060, #7b1fa2) }
    .btns {display: flex;gap: 20px;}
    .btns label {padding: 12px 25px;border-radius: 20px; display: none;background-color: #333;color: #fff;}
    .btns label.dim {opacity: 0.6;cursor: not-allowed;}
    
  </style>
</head>
<body class="center">
  <input type="radio" name="c" id="c1" hidden checked>
  <input type="radio" name="c" id="c2" hidden>
  <input type="radio" name="c" id="c3" hidden>

  <div class="scene">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
  </div>
  <div class="btns">
    <label class="dim p1">이전</label>
    <label for="c1" class="p2">이전</label>
    <label for="c2" class="p3">이전</label>
    <label for="c2" class="n2">이전</label>
    <label for="c3" class="n3">이전</label>
    <label class="dim n1">다음</label>
  </div>
</body>
</html>
