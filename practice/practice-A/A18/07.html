<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .wrap{display: flex;gap: 20px;}
    .card { font-weight: bold; transition: .8s;  width: 180px;height: 250px;transform-style: preserve-3d;}
    .front, .back {border-radius: 20px;display: flex;justify-content: center;align-items: center; position: absolute;backface-visibility: hidden;color: white;width: 100%;height: 100%;}
    .c1 .front, .c1 .back {background-color: red;}
    .c2 .front, .c2 .back {background-color: yellow;}
    .c3 .front, .c3 .back {background-color: yellowgreen;}
    .c4 .front, .c4 .back {background-color: blue;}
    .c5 .front, .c5 .back {background-color: blueviolet;}
    .c6 .front, .c6 .back {background-color: pink;}
    .front {transform: translateZ(1px);}
    .back {transform: translateZ(1px) rotateY(180deg);}
    .card:hover { transform: rotateY(180deg); }
  </style>
</head>
<body class="center">
  <div class="wrap">
    <div class="card c1">
      <div class="front">Card 1</div>
      <div class="back">1</div>
    </div>
    <div class="card c2">
      <div class="front">Card 2</div>
      <div class="back">2</div>
    </div>
    <div class="card c3">
      <div class="front">Card 3</div>
      <div class="back">3</div>
    </div>
    <div class="card c4">
      <div class="front">Card 4</div>
      <div class="back">4</div>
    </div>
    <div class="card c5">
      <div class="front">Card 5</div>
      <div class="back">5</div>
    </div>
    <div class="card c6">
      <div class="front">Card 6</div>
      <div class="back">6</div>
    </div>
  </div>
</body>
</html>
