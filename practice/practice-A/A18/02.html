<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .wrap {display: flex;gap: 20px;}
    .card {cursor: pointer;width: 150px;height: 200px; perspective: 1000px;}
    .inner {transition: .8s cubic-bezier(0.455, 0.03, 0.515, 0.955); width: 100%;height: 100%;transform-style: preserve-3d;position: relative;}
    .card:hover .inner {transform: rotateY(180deg);}
    .front, .back {display: flex;justify-content: center;align-items: center;color: #fff; backface-visibility: hidden;position: absolute;inset: 0;border-radius: 18px;}
    .front {z-index: 2;transform: translateZ(1px);}
    .back {z-index: 2;transform: rotateY(180deg) translateZ(1px);font-size: 1.5rem;font-weight: bold;}
        .c1 .front, .c1 .back {background-color: red;}
    .c2 .front, .c2 .back {background-color: yellow;}
    .c3 .front, .c3 .back {background-color: greenyellow;}
    .c4 .front, .c4 .back {background-color: blue;}
    .c5 .front, .c5 .back {background-color: blueviolet;}
    .c6 .front, .c6 .back {background-color: pink;}
  </style>
</head>
<body class="center">
  <div class="wrap">
    <div class="card c1">
      <div class="inner">
        <div class="front">Card 1</div>
        <div class="back">1</div>
      </div>
    </div>
    <div class="card c2">
      <div class="inner">
        <div class="front">Card 2</div>
        <div class="back">2</div>
      </div>
    </div>
    <div class="card c3">
      <div class="inner">
        <div class="front">Card 3</div>
        <div class="back">3</div>
      </div>
    </div>
    <div class="card c4">
      <div class="inner">
        <div class="front">Card 4</div>
        <div class="back">4</div>
      </div>
    </div>
    <div class="card c5">
      <div class="inner">
        <div class="front">Card 5</div>
        <div class="back">5</div>
      </div>
    </div>
    <div class="card c6">
      <div class="inner">
        <div class="front">Card 6</div>
        <div class="back">6</div>
      </div>
    </div>
  </div>
</body>
</html>
