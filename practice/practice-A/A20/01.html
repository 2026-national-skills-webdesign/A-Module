<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    :root { --img-1: url("images/shanghai.jpg"); --img-2: url("images/lyon.jpg"); --img-3: url("images/kazan.jpg"); --img-4: url("images/abu-dhabi.jpg"); --img-5: url("images/sao-paulo.jpg"); }

    .control {z-index: 1;visibility: hidden; padding: 5px 10px;position: absolute;width: 50px;height: 50px;display: flex;justify-content: center;align-items: center;cursor: pointer;font-size: 20px; background-color: #333;color: white;border: 1px solid #ccc;}
    .control:active {background-color: #555;}
    .control-left {bottom: 300px;left: calc(50% - 200px);}
    .control-right {bottom: 300px;right: calc(50% - 200px);}

    .p1:checked ~ [for="p5l"],
    .p1:checked ~ [for="p2r"],
    .p2:checked ~ [for="p1l"],
    .p2:checked ~ [for="p3r"],
    .p3:checked ~ [for="p2l"],
    .p3:checked ~ [for="p4r"],
    .p4:checked ~ [for="p3l"],
    .p4:checked ~ [for="p5r"],
    .p5:checked ~ [for="p4l"],
    .p5:checked ~ [for="p1r"] {visibility: visible;}

    .book {position: relative;width: 1000px;height: 750px;display: flex;position: relative;perspective: 3000px;border: goldenrod solid 15px;}
    .book .page {flex: 1;}
    .book > .sheet {animation-duration: 1s; animation-fill-mode: forwards; width: 50%;height: 100%;position: absolute;left: 50%;top: 0;transform-origin: 0 50%; transform-style: preserve-3d;display: grid;}
    .book .sheet .page { grid-column: 1; grid-row: 1;width: 100%;height: 100%; backface-visibility: hidden;}
    .book > .sheet .page-2 {transform: rotateY(180deg);}
    .book .page.left {background-position-x: 0;}
    .book .page.right {background-position-x: 100%;}

    #p1l:checked ~ .book .sheet {animation-name: l1;}
    #p2l:checked ~ .book .sheet {animation-name: l2;}
    #p3l:checked ~ .book .sheet {animation-name: l3;}
    #p4l:checked ~ .book .sheet {animation-name: l4;}
    #p5l:checked ~ .book .sheet {animation-name: l5;}
    #p1r:checked ~ .book .sheet {animation-name: r1;}
    #p2r:checked ~ .book .sheet {animation-name: r2;}
    #p3r:checked ~ .book .sheet {animation-name: r3;}
    #p4r:checked ~ .book .sheet {animation-name: r4;}
    #p5r:checked ~ .book .sheet {animation-name: r5;}

    #p1l:checked ~ .book .page-1 { background-image: var(--img-1); }
    #p1l:checked ~ .book .page-2 {  background-image: var(--img-2); }
    #p2l:checked ~ .book .page-1 {  background-image: var(--img-2); }
    #p2l:checked ~ .book .page-2 {  background-image: var(--img-3); }
    #p3l:checked ~ .book .page-1 {  background-image: var(--img-3); }
    #p3l:checked ~ .book .page-2 {  background-image: var(--img-4); }
    #p4l:checked ~ .book .page-1 {  background-image: var(--img-4); }
    #p4l:checked ~ .book .page-2 {  background-image: var(--img-5); }
    #p5l:checked ~ .book .page-1 {  background-image: var(--img-5); }
    #p5l:checked ~ .book .page-2 {  background-image: var(--img-1); }

    #p1r:checked ~ .book .page-1 { background-image: var(--img-5); }
    #p1r:checked ~ .book .page-2 { background-image: var(--img-1); }
    #p2r:checked ~ .book .page-1 { background-image: var(--img-1); }
    #p2r:checked ~ .book .page-2 { background-image: var(--img-2); }
    #p3r:checked ~ .book .page-1 { background-image: var(--img-2); }
    #p3r:checked ~ .book .page-2 { background-image: var(--img-3); }
    #p4r:checked ~ .book .page-1 { background-image: var(--img-3); }
    #p4r:checked ~ .book .page-2 { background-image: var(--img-4); }
    #p5r:checked ~ .book .page-1 { background-image: var(--img-4); }
    #p5r:checked ~ .book .page-2 { background-image: var(--img-5); }

    @keyframes l1 { from {transform: rotateY(-180deg);} to {transform: rotateY();} }
    @keyframes l2 { from {transform: rotateY(-180deg);} to {transform: rotateY();} }
    @keyframes l3 { from {transform: rotateY(-180deg);} to {transform: rotateY();} }
    @keyframes l4 { from {transform: rotateY(-180deg);} to {transform: rotateY();} }
    @keyframes l5 { from {transform: rotateY(-180deg);} to {transform: rotateY();} }

    @keyframes r1 { from {transform: rotateY(0);} to {transform: rotateY(-180deg);} }
    @keyframes r2 { from {transform: rotateY(0);} to {transform: rotateY(-180deg);} }
    @keyframes r3 { from {transform: rotateY(0);} to {transform: rotateY(-180deg);} }
    @keyframes r4 { from {transform: rotateY(0);} to {transform: rotateY(-180deg);} }
    @keyframes r5 { from {transform: rotateY(0);} to {transform: rotateY(-180deg);} }
  </style>
</head>
<body class="center">
  <input type="radio" name="page" id="p1l" class="p1 l" hidden checked>
  <input type="radio" name="page" id="p2l" class="p2 l" hidden>
  <input type="radio" name="page" id="p3l" class="p3 l" hidden>
  <input type="radio" name="page" id="p4l" class="p4 l" hidden>
  <input type="radio" name="page" id="p5l" class="p5 l" hidden>

  <input type="radio" name="page" id="p1r" class="p1 r" hidden>
  <input type="radio" name="page" id="p2r" class="p2 r" hidden>
  <input type="radio" name="page" id="p3r" class="p3 r" hidden>
  <input type="radio" name="page" id="p4r" class="p4 r" hidden>
  <input type="radio" name="page" id="p5r" class="p5 r" hidden>

  <label class="control control-left" for="p1l">&lt;</label>
  <label class="control control-left" for="p2l">&lt;</label>
  <label class="control control-left" for="p3l">&lt;</label>
  <label class="control control-left" for="p4l">&lt;</label>
  <label class="control control-left" for="p5l">&lt;</label>

  <label class="control control-right" for="p1r">&gt;</label>
  <label class="control control-right" for="p2r">&gt;</label>
  <label class="control control-right" for="p3r">&gt;</label>
  <label class="control control-right" for="p4r">&gt;</label>
  <label class="control control-right" for="p5r">&gt;</label>

  <div class="book">
    <div class="page page-1 left"></div>
    <div class="sheet">
      <div class="page page-1 right"></div>
      <div class="page page-2 left"></div>
    </div>
    <div class="page page-2 right"></div>
  </div>
</body>
</html>
