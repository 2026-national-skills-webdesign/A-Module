<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>A20</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<!-- ==================================== -->
<!-- TODO: 아래에 코드를 입력하시오 -->
<!-- ==================================== -->

<!-- 왼쪽 누를때 : 왼쪽에서 오른쪽으로 넘어가기  -->
<input type="radio" name="page" id="p1l" class="p1 l" checked>
<input type="radio" name="page" id="p2l" class="p2 l">
<input type="radio" name="page" id="p3l" class="p3 l">
<input type="radio" name="page" id="p4l" class="p4 l">
<input type="radio" name="page" id="p5l" class="p5 l">

<!-- 오른쪽 누를때 : 오른쪽에서 왼쪽으로 넘어가기 -->
<input type="radio" name="page" id="p1r" class="p1 r">
<input type="radio" name="page" id="p2r" class="p2 r">
<input type="radio" name="page" id="p3r" class="p3 r">
<input type="radio" name="page" id="p4r" class="p4 r">
<input type="radio" name="page" id="p5r" class="p5 r">

<!-- 컨트롤러 왼쪽 -->
<label class="control control-left" for="p1l">&#x276E;</label>
<label class="control control-left" for="p2l">&#x276E;</label>
<label class="control control-left" for="p3l">&#x276E;</label>
<label class="control control-left" for="p4l">&#x276E;</label>
<label class="control control-left" for="p5l">&#x276E;</label>

<!-- 컨트롤러 오른쪽 -->
<label class="control control-right" for="p1r">&#x276F;</label>
<label class="control control-right" for="p2r">&#x276F;</label>
<label class="control control-right" for="p3r">&#x276F;</label>
<label class="control control-right" for="p4r">&#x276F;</label>
<label class="control control-right" for="p5r">&#x276F;</label>

<!-- 책 -->
<div id="book">

    <div class="page page-1 left"></div>

    <div class="sheet">
        <div class="page page-1 right"></div>
        <div class="page page-2 left"></div>
    </div>

    <div class="page page-2 right"></div>

</div>

</body>
</html>
