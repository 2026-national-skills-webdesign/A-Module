<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>A19</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      perspective: 1200px;
      gap: 40px
    }

    input {
      display: none
    }

    .scene {
      width: 280px;
      height: 360px;
      position: relative;
      transform-style: preserve-3d
    }

    .card {
      position: absolute;
      width: 280px;
      height: 360px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #fff;
      transition: all .6s ease;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .15)
    }

    .card:nth-child(1) {
      background: linear-gradient(135deg, #f97060, #e91e8c)
    }

    .card:nth-child(2) {
      background: linear-gradient(135deg, #6c63ff, #3b82f6)
    }

    .card:nth-child(3) {
      background: linear-gradient(135deg, #4a0060, #7b1fa2)
    }

    #c1:checked~.scene .card:nth-child(1) {
      transform: translateZ(60px) rotateY(0deg);
      z-index: 3;
      opacity: 1
    }

    #c1:checked~.scene .card:nth-child(2) {
      transform: translateZ(0px) rotateY(-8deg) translateX(-30px);
      z-index: 2;
      opacity: .5
    }

    #c1:checked~.scene .card:nth-child(3) {
      transform: translateZ(-60px) rotateY(-14deg) translateX(-60px);
      z-index: 1;
      opacity: .3
    }

    #c2:checked~.scene .card:nth-child(1) {
      transform: translateX(200%) rotateZ(15deg);
      z-index: 0;
      opacity: 0
    }

    #c2:checked~.scene .card:nth-child(2) {
      transform: translateZ(60px) rotateY(0deg);
      z-index: 3;
      opacity: 1
    }

    #c2:checked~.scene .card:nth-child(3) {
      transform: translateZ(0px) rotateY(-8deg) translateX(-30px);
      z-index: 2;
      opacity: .5
    }

    #c3:checked~.scene .card:nth-child(1) {
      transform: translateX(200%) rotateZ(15deg);
      z-index: 0;
      opacity: 0
    }

    #c3:checked~.scene .card:nth-child(2) {
      transform: translateX(200%) rotateZ(15deg);
      z-index: 0;
      opacity: 0
    }

    #c3:checked~.scene .card:nth-child(3) {
      transform: translateZ(60px) rotateY(0deg);
      z-index: 3;
      opacity: 1
    }

    #c4:checked~.scene .card:nth-child(1) {
      transform: translateX(200%) rotateZ(15deg);
      z-index: 0;
      opacity: 0
    }

    #c4:checked~.scene .card:nth-child(2) {
      transform: translateX(200%) rotateZ(15deg);
      z-index: 0;
      opacity: 0
    }

    #c4:checked~.scene .card:nth-child(3) {
      transform: translateX(200%) rotateZ(15deg);
      z-index: 0;
      opacity: 0
    }

    .btns {
      display: flex;
      gap: 20px
    }

    .btns label {
      padding: 12px 30px;
      border-radius: 25px;
      background: #333;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      transition: .3s
    }

    .btns label:hover {
      background: #555
    }

    .prev12,
    .prev23,
    .prev34,
    .next12,
    .next23,
    .next34 {
      display: none
    }

    #c1:checked~.btns .next12 {
      display: inline-block
    }

    #c2:checked~.btns .prev12 {
      display: inline-block
    }

    #c2:checked~.btns .next23 {
      display: inline-block
    }

    #c3:checked~.btns .prev23 {
      display: inline-block
    }

    #c3:checked~.btns .next34 {
      display: inline-block
    }

    #c4:checked~.btns .prev34 {
      display: inline-block
    }
  </style>
</head>

<body>
  <input type="radio" name="c" id="c1" checked>
  <input type="radio" name="c" id="c2">
  <input type="radio" name="c" id="c3">
  <input type="radio" name="c" id="c4">
  <div class="scene">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
  </div>
  <div class="btns">
    <label for="c1" class="prev12">이전</label>
    <label for="c2" class="prev23">이전</label>
    <label for="c3" class="prev34">이전</label>
    <label for="c0" class="next12" style="opacity: .6;cursor: not-allowed;">이전</label>
    <label for="c0" class="prev34" style="opacity: .6;cursor: not-allowed;">다음</label>
    <label for="c2" class="next12">다음</label>
    <label for="c3" class="next23">다음</label>
    <label for="c4" class="next34">다음</label>
  </div>
</body>

</html>
