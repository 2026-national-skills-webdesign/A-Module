<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>A19</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; perspective: 1200px; gap: 40px }
input { display: none }
.scene { width: 280px; height: 360px; position: relative; transform-style: preserve-3d }
.card { position: absolute; width: 280px; height: 360px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #fff; transition: all .6s ease; box-shadow: 0 20px 40px rgba(0,0,0,.15) }
.card:nth-child(1) { background: linear-gradient(135deg, #f97060, #e91e8c) }
.card:nth-child(2) { background: linear-gradient(135deg, #6c63ff, #3b82f6) }
.card:nth-child(3) { background: linear-gradient(135deg, #4a0060, #7b1fa2) }
.btns { display: flex; gap: 20px }
.btns label { display: none; padding: 12px 30px; border-radius: 25px; background: #333; color: #fff; cursor: pointer; font-size: 1rem; transition: .3s }
.btns label:hover { background: #555 }
.btns label.dim { opacity: .6; cursor: not-allowed }
#c1:checked ~ .scene .card:nth-child(1), #c2:checked ~ .scene .card:nth-child(2), #c3:checked ~ .scene .card:nth-child(3) { transform: translateZ(60px); z-index: 3; opacity: 1 }
#c1:checked ~ .scene .card:nth-child(2), #c2:checked ~ .scene .card:nth-child(3) { transform: translateZ(0) rotateY(-8deg) translateX(-30px); z-index: 2; opacity: .5 }
#c1:checked ~ .scene .card:nth-child(3) { transform: translateZ(-60px) rotateY(-14deg) translateX(-60px); z-index: 1; opacity: .3 }
#c2:checked ~ .scene .card:nth-child(1), #c3:checked ~ .scene .card:nth-child(1), #c3:checked ~ .scene .card:nth-child(2) { transform: translateX(200%) rotateZ(15deg); z-index: 0; opacity: 0 }
#c1:checked ~ .btns .p1, #c1:checked ~ .btns .n2 { display: inline-block }
#c2:checked ~ .btns .p2, #c2:checked ~ .btns .n3 { display: inline-block }
#c3:checked ~ .btns .p3, #c3:checked ~ .btns .n1 { display: inline-block }
</style>
</head>
<body>
  <input type="radio" name="c" id="c1" checked>
  <input type="radio" name="c" id="c2">
  <input type="radio" name="c" id="c3">
  <div class="scene">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
  </div>
  <div class="btns">
    <label class="dim p1">이전</label>
    <label for="c1" class="p2">이전</label>
    <label for="c2" class="p3">이전</label>
    <label for="c2" class="n2">다음</label>
    <label for="c3" class="n3">다음</label>
    <label class="dim n1">다음</label>
  </div>
</body>
</html>
