<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .items, .dragZone {display: grid;grid-template-columns: repeat(3, 1fr);gap: 20px;width: 700px;height: 500px;border: 1px solid black;}
    .container {display: flex;align-items: center;justify-content: center;}
  </style>
</head>
<body class="center">
  <div class="container">
    <ul class="items">
    <li class="item"><img src="./test-images/test1.gif"></li>
    <li class="item"><img src="./test-images/test1.jpg"></li>
    <li class="item"><img src="./test-images/test1.png"></li>
    <li class="item"><img src="./test-images/test2.gif"></li>
    <li class="item"><img src="./test-images/test2.jpg"></li>
    <li class="item"><img src="./test-images/test2.png"></li>
  </ul>
  <div class="dragZone">
    <p>이미지를 여기에 드래그하세요</p>
  </div>
  <button onclick="location.reload()">초기화</button>
  </div>
</body>
<script src="../lib/lib.js"></script>
<script>
const itemZone = $(".items")
const items = $$(".item")
const dragZone  = $(".dragZone")

items.forEach(item => {
  item.addEventListener("dragstart", (e) => {
    e.currentTarget.classList.add("dragging")
    e.dataTransfer.setData("text/html", "")
  }) 
})
dragZone.addEventListener("dragover", (e) => e.preventDefault())
dragZone.addEventListener("drop", (e) => {
  const draggingItem = document.querySelector(".dragging")
  if(draggingItem) dragZone.append(draggingItem)
  $("p").style.display = "none"
})
</script>
</html>
