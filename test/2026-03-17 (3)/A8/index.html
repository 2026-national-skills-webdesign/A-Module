<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .container {display: flex;flex-direction: column;width: 1000px;}
    header{display: flex;justify-content: center;align-items: center; width: 1000px;background-color: rgb(68, 68, 68);color: white;}
    main {display: flex;flex-direction: column;}
    .pro{border-bottom: 1px solid gray; padding: 20px;display: flex;gap: 30px;align-items: center;}
    img {border-radius: 10px;}
    .cl {display: flex;flex-direction: column;}
    .df {display: flex;align-items: center;justify-content: space-between;}
    span {width: 20px;height: 20px;border: 1px solid black;display: flex;justify-content: center;align-items: center;}
    .close {background-color: red;border-radius: 50%;}
    .pro {width: 800px;display: flex;justify-content: space-between;}
    footer {display: flex;flex-direction: column;}
footer > div {width: 1000px;height: 100px;}
.top, .mid {border-bottom: 1px solid gray;}
.bot {gap: 20px;margin-top: 20px;width: 1000px;display: flex;justify-content: center;align-items: center;}
button{padding: 10px;}
.grn {background-color: green;color: white;}
  </style>
</head>
<body class="center">
  <div class="container">
    <header>
      <h1>장바구니</h1>
    </header>
    <main>
      <div class="pro">
        <img src="./images/tshirt.jpg" alt="">
        <div class="cl">
          <div class="title">WorldSkills 공식 티셔츠</div>
          <div class="sub">색상: 네이비</div>
          <div class="sub">사이즈: L</div>
        </div>
        <div class="df">
          <span>-</span>
          <p>2</p>
          <span>+</span>
        </div>
        <div class="df">
          <div class="title"></div>
          <span class="close">×</span>
        </div>
      </div>
      <div class="pro">
        <img src="./images/book.jpg" alt="">
        <div class="cl">
          <div class="title">기능경기 가이드북</div>
          <div class="sub">종류: 웹디자인</div>
          <div class="sub">2026년 최신판</div>
        </div>
        <div class="df">
          <span>-</span>
          <p>1</p>
          <span>+</span>
        </div>
        <div class="df">
          <div class="title"></div>
          <span class="close">×</span>
        </div>
      </div>
      <div class="pro">
        <img src="./images/laptop-case.jpg" alt="">
        <div class="cl">
          <div class="title">WorldSkills 노트북 파우치</div>
          <div class="sub">색상: 블랙</div>
          <div class="sub">15인치 호환</div>
        </div>
        <div class="df">
          <span>-</span>
          <p>1</p>
          <span>+</span>
        </div>
        <div class="df">
          <div class="title"></div>
          <span class="close">×</span>
        </div>
      </div>
    </main>
    <footer>
      <div class="top df">
        <div class="cl">
          <p>상품금액</p>
          <p>배송비</p>
        </div>
        <div class="cl">
          <p>75,000원</p>
          <p>3,000원</p>
        </div>
      </div>
      <div class="mid df">
        <div class="df" style="justify-content: space-between; width: 1000px;">
          <p>총 결제금액</p>
          <p>78,000원</p>
        </div>
      </div>
      <div class="bot">
        <button>쇼핑 계속하기</button>
        <button class="grn">주문하기</button>
      </div>
    </footer>
  </div>
</body>
</html>
