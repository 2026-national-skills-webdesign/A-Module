<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {transition: .3s;}
    body:has(#dark:checked) {background-color: #222;}
    body:has(#light:checked) {background-color: #fff;}
    #dark:checked ~ [for=dark]  {display: none;}
    #light:checked ~ [for=light]  {display: none;}
    [for=dark] {background-color: darkblue;display: block;width: 150px;line-height: 50px;text-align: center;height: 50px;color: yellow;}
    [for=light] {background-color: gray;display: block;width: 150px;line-height: 50px;text-align: center;height: 50px;color: white;}
  </style>
</head>
<body>
  <input type="radio" name="r" id="light" hidden>
  <input type="radio" name="r" id="dark" hidden checked>
  <label for="light">라이트모드</label>
  <label for="dark">다크모드</label>
</body>
</html>
