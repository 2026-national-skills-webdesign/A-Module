<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{outline: none;}
    </style>
</head>

<body>
    <input type="text" id="i">
</body>
<script>
    const getPsw = pw => {
        const l = pw.length
        const a = /[A-Z]/.test(pw)
        const n = /[0-9]/.test(pw)
        const t = /[!@#$%^&*]/.test(pw)

        i.style.borderColor =
            !l ? "black" : (l >= 8 && a && n && t) ? "green" : (l >= 8 && (a || n)) ? "yellow" : "red"
    }

    i.addEventListener("input", () => {
        getPsw(i.value)
    })
</script>

</html>
