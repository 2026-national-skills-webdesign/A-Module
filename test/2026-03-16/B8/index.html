<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .grn {background-color: greenyellow;}
    .pink {background-color: pink;}
  </style>
</head>
<body class="center">
  <ul id="logs"></ul>
  <div>
    <button onclick="createNotice('grn')">성공</button>
    <button onclick="createNotice('pink')">실패</button>
  </div>
</body>
<script src="../lib/lib.js"></script>
<script>
  function createNotice(value) {
    const li = newEl("li", {
      textContent: value === "grn" ? "성공하였습니다" : "실패하였습니다",
      className: value
    })
    logs.append(li)
    li.onclick = () => {
      li.remove()
    }
    setTimeout(() => {
      li.remove()
    }, 5000)
  }
</script>
</html>
