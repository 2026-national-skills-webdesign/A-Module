<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dragZone, .items {display: grid;grid-template-columns: repeat(3, 1fr);width: 800px;height: 500px;grid-template: 20px;border: 1px solid black;}
        .container {display: flex;gap: 50px;align-items: center;}
    </style>
    <link rel="stylesheet" href="../lib/lib.css">
</head>

<body class="center">
    <div class="container">
        <div class="items">
            <li class="item"><img src="./test-images/test1.gif"></li>
            <li class="item"><img src="./test-images/test1.jpg"></li>
            <li class="item"><img src="./test-images/test1.png"></li>
            <li class="item"><img src="./test-images/test2.gif"></li>
            <li class="item"><img src="./test-images/test2.jpg"></li>
            <li class="item"><img src="./test-images/test2.png"></li>
        </div>
        <div class="dragZone">
            <p>이미지를 여기에 드래그하세요</p>
        </div>
        <button onclick="location.reload()">초기화</button>
    </div>
</body>
<script src="../lib/lib.js"></script>
<script>
    const items = $$(".item")
    const dragZone = $(".dragZone")

    items.forEach(item => {
        item.draggable = true
        item.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("text/html", "")
            e.currentTarget.classList.add("dragging")
        })
    })
    dragZone.addEventListener("dragover", (e) => e.preventDefault())
    dragZone.addEventListener("drop", () => {
        const dragItem = document.querySelector(".dragging")
        if(dragItem) dragZone.append(dragItem)
        $("p").style.display = "none"
    })
</script>
</html>
