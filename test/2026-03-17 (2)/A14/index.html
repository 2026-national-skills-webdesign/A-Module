<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">

  <style>
    .btn1::after {position: absolute;content: attr(data-tip);top: 20px;font-size: 12px; transform: translate(-130%, 3050%);opacity: 0;}
    .btn2::after {position: absolute;content: attr(data-tip);top: 20px;font-size: 12px; transform: translate(-20%, 3050%);opacity: 0;}
    .btn1:hover::after{opacity: 1;}
    .btn1:focus::after{opacity: 1;}
    .btn2:hover::after{opacity: 1;}
    .btn2:focus::after{opacity: 1;}
  </style>
</head>

<body class="center">
  <ul>
    <button class="btn1" data-tip="“설정” 버튼을 눌러 서비스를 설정할 수 있습니다.">설정</button>
    <button class="btn2" data-tip="로그아웃되고 메인페이지로 이동합니다.">로그아웃</button>
  </ul>
</body>

</html>
