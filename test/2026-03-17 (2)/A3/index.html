<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {transition: .3s;}
    body:has(#dark:checked) {background-color: #222;}
    body:has(#light:checked) {background-color: #fff;}
    #light:checked ~ [for="light"] {display: none;}
    #dark:checked ~ [for="dark"] {display: none;}
    [for="dark"] {background-color: darkblue; color: yellow; display: flex;width: 100px;height: 50px;justify-content: center;align-items: center;}
    [for="light"] {background-color: gray; color: white; display: flex;width: 100px;height: 50px;justify-content: center;align-items: center;}
  </style>
</head>
<body>
  <input type="radio" name="r" id="dark" hidden>
  <input type="radio" name="r" id="light" hidden checked>
  <label for="dark">다크모드</label>
  <label for="light">라이트모드</label>
</body>
</html>
