<!DOCTYPE html>
<html lang="en">

<head>

  <title>Document</title>
  <style>
    .container {border-radius: 20px; display: flex;flex-direction: column;box-shadow: 0 0 10px gray;}

    span {display: flex;justify-content: center;align-items: center;color: white; width: 60px;height: 30px;border-radius: 20px;text-align: center;line-height: 30px;display: block; background-color: blue;}
    .imp {background-color: red;}
  </style>
  <link rel="stylesheet" href="../lib/lib.css">
</head>

    </div>
    <div class="notice">
      <div>

    </div>

</body>

</html>
