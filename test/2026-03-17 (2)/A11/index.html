<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    header {
      width: 100vw;
      height: 100px;
      background-color: antiquewhite;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .nav {position: absolute;}
    [for=ham]{display: none;position: absolute;}
    @media (max-width:768px) {
      .nav {display: none;}
      [for=ham] {display: flex;}
      #ham:checked ~ header .nav {top: 100px;display: flex;flex-direction: column;width: 500px;background-color: antiquewhite;}
    }
  </style>
</head>

<body>
  <input type="checkbox" id="ham" hidden>
  <header>
    <div class="nav">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
    <label for="ham">≡</label>
  </header>
</body>

</html>
