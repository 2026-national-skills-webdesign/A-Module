<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    button:hover {background-color: rgb(0, 0, 0);}
    form {display: flex;flex-direction: column;align-items: center;justify-content: center;gap: 20px;}
    form {padding: 30px;}
    input {width: 300px;padding: 10px;border-radius: 5px;}
    button {padding: 10px;transition: .3s; width: 300px;background-color: rgb(75, 75, 75);color: white;}
    div {display: flex;flex-direction: column;gap: 10px;}
  </style>
</head>
<body class="center">
  <form action="" method="post">
    <div>
      <label for="name">이름</label>
      <input type="text" required placeholder="이름" id="name">
    </div>
   <div>
    <label for="pw">비밀번호</label>
     <input type="password" required placeholder="비밀번호" id="pw">
   </div>
    <div>
      <label for="pwc">비밀번호 확인</label>
      <input type="password" required placeholder="비밀번호 확인" id="pwc">
    </div>
    <div>
      <label for="eaail">이메일</label>
      <input type="email" required placeholder="이메일" id="email">
    </div>
    <button>회원가입</button>
  </form>
</body>
</html>
