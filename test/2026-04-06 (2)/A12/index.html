<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    body {background-color: #252F39;}
    .circle {width: 30px;height: 30px;border-radius: 50%;position: absolute;}
    .c1 {background-color: #FFD1DC; animation: loading 2s infinite; animation-delay: 0s;}
    .c2 {background-color: #C3E0E5; animation: loading 2s infinite; animation-delay: -0.5s;}
    .c3 {background-color: #E6DAF7; animation: loading 2s infinite; animation-delay: -1s;}
    .c4 {background-color: #FFDAB9; animation: loading 2s infinite; animation-delay: -1.5s;}

    @keyframes loading {
      0%{transform: translate(0, 0); }
      25%{transform: translate(-50px, 0); }
      50%{transform: translate(-50px, 50px); }
      75%{transform: translate(0px, 50px); }
      100%{transform: translate(0, 0); }
    }
  </style>
</head>
<body class="center">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="circle c4"></div>
</body>
</html>
