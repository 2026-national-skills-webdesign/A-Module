<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    button {position: relative;}
    ul {display: flex;gap: 50px;}
    .btn1::after {opacity: 0;content: attr(data-tip);font-size: 12px;width: 250px;bottom: 30px;position: absolute;right: 0px;}
    .btn1:hover::after {opacity: 1;}
    .btn1:focus::after {opacity: 1;}
    .btn2::after {opacity: 0;content: attr(data-tip);font-size: 12px;width: 250px;position: absolute;bottom: 0;}
    .btn2:hover::after {opacity: 1;}
    .btn2:focus::after {opacity: 1;}

  </style>
</head>

<body class="center">
  <ul>
    <button class="btn1" data-tip="“설정” 버튼을 눌러 서비스를 설정할 수 있습니다.">설정</button>
    <button class="btn2" data-tip="로그아웃되고 메인페이지로 이동합니다.">로그아웃</button>
  </ul>
</body>

</html>
